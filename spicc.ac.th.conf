# =========================
# HTTP → HTTPS Redirect
# =========================
server {
    listen 80;
    server_name spicc.ac.th www.spicc.ac.th;

    return 301 https://spicc.ac.th$request_uri;
}

# =========================
# HTTPS Main Server
# =========================
server {
    listen 443 ssl http2;
    server_name spicc.ac.th www.spicc.ac.th;

    root /var/www/spicc/web;
    index index.php index.html;

    # SSL
    ssl_certificate /etc/letsencrypt/live/spicc.ac.th/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spicc.ac.th/privkey.pem;

    # =========================
    # Gzip
    # =========================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # =========================
    # Uploads
    # =========================
    location /web/uploads/ {
        alias /var/www/spicc/web/public/uploads/;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # =========================
    # Next.js Static
    # =========================
    location /web/_next/static/ {
        alias /var/www/spicc/web/.next/static/;
        expires 365d;
        access_log off;
    }

    # =========================
    # 🎵 Audio Stream Proxy (Optimized for streaming)
    # =========================
    location /api/stream/ {
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;

        # Disable buffering for real-time streaming
        proxy_buffering off;
        proxy_request_buffering off;

        # Long timeout for audio streams
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;

        # No body size limit for streaming
        client_max_body_size 0;

        # Keep-alive
        proxy_set_header Connection '';

        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward range requests (for seeking)
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        # CORS
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers 'Range' always;
        add_header Access-Control-Expose-Headers 'Content-Length,Content-Range' always;
    }

    # =========================
    # ✅ Node API (General)
    # =========================
    location /api/ {
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Reasonable timeout for API calls (yt-dlp can be slow)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # =========================
    # Next.js App
    # =========================
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;

        proxy_cache_bypass $http_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================
    # phpMyAdmin (เปิดใช้งานปกติ)
    # =========================
    location /phpmyadmin {
        alias /usr/share/phpmyadmin;
        index index.php;

        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }

    # =========================
    # Security Headers
    # =========================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}